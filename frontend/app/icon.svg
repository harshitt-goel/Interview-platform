  <!-- Corner brackets -->
  <g stroke="#1e4fa8" stroke-width="3" fill="none">
    <polyline points="80,110 80,82 108,82"/>
    <polyline points="720,110 720,82 692,82"/>
    <polyline points="80,690 80,718 108,718"/>
    <polyline points="720,690 720,718 692,718"/>
  </g>

  <!-- BIG P -->
  <!-- stem -->
  <rect x="112" y="130" width="68" height="318" rx="10" fill="#3b82f6"/>
  <!-- top bar -->
  <rect x="112" y="130" width="300" height="68" rx="10" fill="#3b82f6"/>
  <!-- right wall -->
  <rect x="344" y="130" width="68" height="206" rx="10" fill="#3b82f6"/>
  <!-- bottom bar of bowl -->
  <rect x="112" y="268" width="300" height="68" rx="10" fill="#3b82f6"/>
  <!-- hollow cutout -->
  <rect x="180" y="198" width="164" height="138" rx="6" fill="#060f1e"/>

  <!-- Precision vertex dots -->
  <g fill="#60a5fa">
    <circle cx="112" cy="130" r="7"/>
    <circle cx="412" cy="130" r="7"/>
    <circle cx="412" cy="336" r="7"/>
    <circle cx="180" cy="336" r="7"/>
    <circle cx="112" cy="448" r="7"/>
    <circle cx="180" cy="448" r="7"/>
  </g>

  <!-- Divider line -->
  <line x1="108" y1="480" x2="692" y2="480" stroke="#111e35" stroke-width="1.5"/>

  <!-- WORDMARK: Placementor — Place white, mentor blue -->
  <text x="112" y="610"
    font-family="'Courier New', Courier, monospace"
    font-size="88" font-weight="700"
    fill="#e2e8f0"
    letter-spacing="-2">Place</text>

  <!-- mentor continues inline. "Place" at 88px Courier ≈ 5 chars × ~53px = ~265px, start mentor at 112+265=377 -->
  <text x="377" y="610"
    font-family="'Courier New', Courier, monospace"
    font-size="88" font-weight="700"
    fill="#3b82f6"
    letter-spacing="-2">mentor</text>

  <!-- Outer border -->
  <rect x="60" y="60" width="680" height="680" rx="96" fill="none" stroke="#1a3460" stroke-width="2"/>
